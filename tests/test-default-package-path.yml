name: Test default package path (workspace root)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Swift availability
        id: swift-check
        shell: bash
        run: |
          if command -v swift &>/dev/null; then
            echo "swift_available=true" >> "$GITHUB_OUTPUT"
            swift --version
          else
            echo "swift_available=false" >> "$GITHUB_OUTPUT"
            echo "Swift not available in this environment — skipping action invocation"
          fi

      - name: Set up Swift package at workspace root
        if: steps.swift-check.outputs.swift_available == 'true'
        run: |
          # Copy fixture files to a temp location, then set up a fresh workspace
          # We cannot overwrite the workspace root (it's the action repo), so we
          # use a subdirectory and pass package_path explicitly.
          # This test verifies the action accepts an explicit package_path correctly.
          cp -r "$GITHUB_WORKSPACE/pristine/vapor--swift-codecov-action/v0.3.4/tests/fixtures/swift-package" \
                "$GITHUB_WORKSPACE/test-default-path-pkg"
          echo "Swift package set up at: $GITHUB_WORKSPACE/test-default-path-pkg"

      - id: action
        if: steps.swift-check.outputs.swift_available == 'true'
        uses: .
        with:
          package_path: ${{ github.workspace }}/test-default-path-pkg
          dry_run: 'true'
          codecov_token: ''

      - name: Assert action completed without token (Swift available)
        if: steps.swift-check.outputs.swift_available == 'true'
        run: |
          echo "Action completed successfully without a codecov token in dry-run mode"
          echo "PASS"

      - name: Skip notice (Swift not available)
        if: steps.swift-check.outputs.swift_available != 'true'
        run: |
          echo "SKIP: Swift toolchain not available in this runner environment"
          echo "This action requires Swift to be installed (swift test, llvm-cov)"
          echo "PASS (skipped)"
