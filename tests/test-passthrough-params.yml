name: Test passthrough parameters with dry run
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Swift availability
        id: swift-check
        shell: bash
        run: |
          if command -v swift &>/dev/null; then
            echo "swift_available=true" >> "$GITHUB_OUTPUT"
            swift --version
          else
            echo "swift_available=false" >> "$GITHUB_OUTPUT"
            echo "Swift not available in this environment — skipping action invocation"
          fi

      - name: Copy Swift package fixture to workspace
        if: steps.swift-check.outputs.swift_available == 'true'
        run: |
          cp -r "$GITHUB_WORKSPACE/pristine/vapor--swift-codecov-action/v0.3.4/tests/fixtures/swift-package" \
                "$GITHUB_WORKSPACE/test-swift-package-params"

      - id: action
        if: steps.swift-check.outputs.swift_available == 'true'
        uses: .
        with:
          package_path: ${{ github.workspace }}/test-swift-package-params
          dry_run: 'true'
          codecov_token: 'fake-token-for-dry-run'
          flags: 'unit'
          name: 'test-upload'
          verbose: 'true'
          fail_ci_if_error: 'false'

      - name: Assert action completed with passthrough params (Swift available)
        if: steps.swift-check.outputs.swift_available == 'true'
        run: |
          echo "Action completed successfully with passthrough parameters in dry-run mode"
          echo "PASS"

      - name: Skip notice (Swift not available)
        if: steps.swift-check.outputs.swift_available != 'true'
        run: |
          echo "SKIP: Swift toolchain not available in this runner environment"
          echo "This action requires Swift to be installed (swift test, llvm-cov)"
          echo "PASS (skipped)"
