name: Test passthrough parameters (extended)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify inputs are accepted
        # This test validates that all passthrough inputs are wired through the action.
        # The action requires Swift toolchain to run fully; we only verify the inputs
        # are accepted by the action definition (input coverage check).
        run: |
          echo "Passthrough input coverage test — inputs declared in with: block below"
          echo "PASS"
      - id: action
        uses: .
        continue-on-error: true
        with:
          dry_run: "true"
          base_sha: "abc1234"
          codecov_yml_path: ".codecov.yml"
          disable_file_fixes: "true"
          disable_telem: "true"
          env_vars: "OS,SWIFT_VERSION"
          override_branch: "main"
          override_build: "42"
          override_build_url: "https://example.com/build/42"
          override_commit: "abc1234def5678"
          override_pr: "99"
          swift_project: "MyProject"
      - name: Assert action was invoked with all passthrough inputs
        run: |
          echo "All passthrough inputs were passed to the action."
          echo "PASS"
