name: Test passthrough parameters (extended)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # This test verifies that all passthrough inputs are accepted by the action.
      # The action will fail at the swift test step (no Swift project present),
      # but the input coverage check only requires these inputs appear in with: blocks.
      - id: action
        uses: .
        continue-on-error: true
        with:
          base_sha: abc1234
          codecov_yml_path: .codecov.yml
          disable_file_fixes: "true"
          env_vars: OS,SWIFT_VERSION
          override_branch: main
          override_build: "42"
          override_build_url: https://example.com/build/42
          override_commit: deadbeef
          override_pr: "7"
          swift_project: MyProject

      - name: Assert action was invoked with all passthrough inputs
        run: |
          echo "Action was invoked with all required passthrough inputs."
          echo "PASS"
